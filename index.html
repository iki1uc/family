<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>use() – iki1uc Operator</title>
<style>
body { background:#000; color:#0f0; font-family:monospace; padding:20px; }
pre { background:#111; padding:10px; border:1px solid #333; }
button { background:#111; border:1px solid #0f0; color:#0f0; padding:6px 12px; margin:6px; }

</style>

<body>

<h2>use(user(lage(respo(argumenteria,myWIKI),formeln),fähigkeiten))</h2>

<button onclick="runUse()">use()</button>

<pre id="out">bereit.</pre>

<script>
function runUse() {
  document.getElementById('out').textContent =
    'use() aktiv.\n' +
    'LAGE: W S A D Q R Y C X geladen\n' +
    'RESPO: Struktur + Ordnung + Wirkung\n' +
    'Argumenteria: Klarheit + Integrität\n' +
    'myWIKI: Formeln sichtbar (neutral)\n' +
    'iki1uc: Module geladen\n' +
    'TMP-LAGE: aktiv\n' +
    'GHOST-SCAN: bereit\n' +
    'reFINAL: +1 System-Reingewinn';
}
</script>

</body>
</html>
